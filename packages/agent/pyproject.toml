[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[project]
name = "contextpulse-agent"
version = "0.1.0"
description = "Agent coordination and session protocol for AI agents"
requires-python = ">=3.12"
dependencies = [
    "contextpulse-core",
]

[tool.setuptools.packages.find]
where = ["src"]
