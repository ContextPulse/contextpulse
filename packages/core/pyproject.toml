[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[project]
name = "contextpulse-core"
version = "0.1.0"
description = "Shared utilities for the ContextPulse platform"
requires-python = ">=3.14"
dependencies = [
    "python-dotenv>=1.0",
    "cryptography>=43.0",
]

[tool.setuptools.packages.find]
where = ["src"]
