[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[project]
name = "contextpulse-core"
version = "0.1.0"
description = "Shared utilities for the ContextPulse platform"
authors = [
    { name = "David Jerard", email = "david@jerardventures.com" },
]
license = "AGPL-3.0-or-later"
readme = "README.md"
keywords = ["mcp", "ai-agents", "context", "claude"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
requires-python = ">=3.12"
dependencies = [
    "python-dotenv>=1.0",
    "cryptography>=43.0",
]

[project.optional-dependencies]
macos = [
    "pyobjc-framework-Cocoa>=10.0",
    "pyobjc-framework-Quartz>=10.0",
    "pyobjc-framework-ApplicationServices>=10.0",
]

[project.urls]
Homepage = "https://contextpulse.ai"
Repository = "https://github.com/junkyard-rules/contextpulse"
Issues = "https://github.com/junkyard-rules/contextpulse/issues"
Documentation = "https://github.com/junkyard-rules/contextpulse#readme"

[tool.setuptools.packages.find]
where = ["src"]
