[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[project]
name = "contextpulse-project"
version = "0.1.0"
description = "Project-aware routing layer for AI agents — scores content against your portfolio and routes insights to the right project."
authors = [
    { name = "David Jerard", email = "david@jerardventures.com" },
]
license = "AGPL-3.0-or-later"
readme = "README.md"
keywords = ["mcp", "ai-agents", "context", "claude", "project", "routing"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
requires-python = ">=3.12"
dependencies = [
    "contextpulse-core",
    "mcp>=1.0",
]

[project.urls]
Homepage = "https://contextpulse.ai"
Repository = "https://github.com/junkyard-rules/contextpulse"
Issues = "https://github.com/junkyard-rules/contextpulse/issues"
Documentation = "https://github.com/junkyard-rules/contextpulse#readme"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[project.scripts]
contextpulse-project-mcp = "contextpulse_project.mcp_server:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
