[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[project]
name = "contextpulse-memory"
version = "0.1.0"
description = "Cross-session persistent memory for AI agents"
requires-python = ">=3.12"
dependencies = [
    "contextpulse-core",
    "mcp[cli]",
]

[tool.setuptools.packages.find]
where = ["src"]
