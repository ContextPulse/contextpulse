[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[project]
name = "contextpulse-voice"
version = "0.1.0"
description = "Voice capture and transcription for AI agents — ContextPulse platform"
requires-python = ">=3.12"
dependencies = [
    "contextpulse-core>=0.1.0",
    "mcp>=1.0",
    "faster-whisper>=1.0",
    "sounddevice>=0.4",
    "numpy>=1.24",
    "pyperclip>=1.8",
    "pyautogui>=0.9",
    "anthropic>=0.39",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
openai = ["openai>=1.0"]

[project.scripts]
contextpulse-voice-mcp = "contextpulse_voice.mcp_server:main"

[tool.setuptools.packages.find]
where = ["src"]
