name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint all packages
        run: |
          ruff check packages/core/src packages/memory/src packages/project/src packages/screen/src packages/voice/src packages/touch/src

  test-cross-platform:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install cross-platform packages
        run: |
          pip install -e packages/core
          pip install -e packages/memory
          pip install -e packages/project
          pip install pytest

      - name: Run cross-platform tests
        run: |
          pytest packages/core/tests packages/memory/tests packages/project/tests -v --tb=short

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install all packages
        run: |
          pip install -e packages/core
          pip install -e packages/screen
          pip install -e packages/voice
          pip install -e packages/touch
          pip install -e packages/memory
          pip install -e packages/project
          pip install pytest

      - name: Run all tests
        run: |
          pytest packages/ -v --tb=short --ignore=packages/agent
