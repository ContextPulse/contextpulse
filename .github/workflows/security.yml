name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_call:  # allow release.yml to call this

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          # Pinned to avoid /releases/latest API rate-limits/outages (hit a 504 on 2026-04-18).
          # Bump periodically and verify against https://github.com/gitleaks/gitleaks/releases
          VERSION="8.28.0"
          URL="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"

          # Retry with exponential backoff — GitHub release CDN occasionally 5xx's.
          for attempt in 1 2 3 4 5; do
            if curl -sSfL --retry 3 --retry-delay 2 --max-time 60 "$URL" | tar xz; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Failed to download gitleaks after 5 attempts"
              exit 1
            fi
            echo "Attempt $attempt failed; sleeping $((attempt * 5))s before retry"
            sleep $((attempt * 5))
          done
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Gitleaks
        run: gitleaks detect --source . --log-opts="--all" -v

  bandit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Bandit (SAST)
        run: |
          # B108: hardcoded /tmp paths (macOS platform code + test fixtures)
          # B310: urllib.urlopen (internal model download URLs, not user input)
          # B608: SQL string construction (internal query building, not user input)
          # B615: HuggingFace download without revision pin (known model repos)
          bandit -r packages/ -ll -q --skip B108,B310,B608,B615

  pip-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages + pip-audit
        run: |
          pip install pip-audit
          pip install -e packages/core -e packages/screen -e packages/voice -e packages/touch -e packages/memory -e packages/project

      - name: pip-audit
        # CVE-2026-3219: pip 26.0.1 — no fix version published upstream yet; revisit when pip ships a patch.
        run: pip-audit --ignore-vuln CVE-2026-3219

  reuse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: REUSE compliance
        run: |
          pip install reuse
          reuse lint
