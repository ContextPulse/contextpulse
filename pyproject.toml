[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[project]
name = "contextpulse"
version = "0.1.0"
description = "Always-on context for AI agents"
requires-python = ">=3.10"
dependencies = []

[tool.setuptools.packages.find]
where = [
    "packages/core/src",
    "packages/screen/src",
    "packages/agent/src",
    "packages/memory/src",
    "packages/project/src",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
testpaths = ["packages/*/tests"]
