<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContextPulse — Coming Soon</title>
  <meta name="description" content="ContextPulse gives AI agents awareness of your screen. Local-first, open source, MCP-native.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="ContextPulse — Coming Soon">
  <meta property="og:description" content="Always-on screen context for AI agents. Local-first, open source.">
  <meta property="og:url" content="https://contextpulse.ai">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0D1117;
      --surface: #161B22;
      --text: #E6EDF3;
      --text-muted: #8B949E;
      --accent: #12B5E0;
      --border: #30363D;
      --font: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --mono: 'Cascadia Code', 'Fira Code', Consolas, monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .logo { width: 72px; height: 72px; margin-bottom: 24px; border-radius: 16px; }
    h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 12px; }
    .tagline { font-size: 1.15rem; color: var(--text-muted); max-width: 480px; margin-bottom: 32px; }
    .badge {
      display: inline-block;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.85rem;
      color: var(--accent);
      background: rgba(18, 181, 224, 0.08);
      margin-bottom: 32px;
    }
    .install {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 24px;
      font-family: var(--mono);
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 40px;
      user-select: all;
    }
    .links { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    .links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }
    .links a:hover { opacity: 0.75; }
    footer {
      position: absolute;
      bottom: 24px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <img src="logo.png" alt="ContextPulse" class="logo">
  <h1>ContextPulse</h1>
  <p class="tagline">Always-on screen context for AI agents. Local-first, open source, MCP-native.</p>
  <div class="badge">Coming Soon</div>
  <div class="install">pip install contextpulse-sight</div>
  <div class="links">
    <a href="https://github.com/jerard-ventures/contextpulse">GitHub</a>
    <a href="https://pypi.org/project/contextpulse-sight/">PyPI</a>
  </div>
  <footer>&copy; 2026 Jerard Ventures LLC</footer>
</body>
</html>
