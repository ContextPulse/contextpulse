AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  ContextPulse License Webhook -- Gumroad sale -> Ed25519 license key -> SES email

Parameters:
  PrivateKeyHex:
    Type: String
    NoEcho: true
    Description: Ed25519 private key (hex-encoded, 64 chars). Store in SSM and reference.
  SenderEmail:
    Type: String
    Default: license@contextpulse.ai
    Description: SES verified sender email address
  GumroadProductId:
    Type: String
    Default: ''
    Description: Gumroad product ID for validation (optional)
  GumroadWebhookSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: Gumroad webhook signing secret for HMAC-SHA256 validation (optional)
  StageName:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]
    Description: API Gateway stage name

Globals:
  Function:
    Timeout: 30
    Runtime: python3.12
    MemorySize: 128
    Architectures:
      - x86_64

Resources:

  # -- DynamoDB Table ---------------------------------------------------------
  LicensesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: contextpulse-licenses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: ContextPulse

  # -- Lambda Function --------------------------------------------------------
  LicenseWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: contextpulse-license-webhook
      Handler: license_webhook.lambda_handler
      CodeUri: .
      Description: Processes Gumroad webhook, generates Ed25519 license, emails via SES
      Environment:
        Variables:
          PRIVATE_KEY_HEX: !Ref PrivateKeyHex
          SENDER_EMAIL: !Ref SenderEmail
          GUMROAD_PRODUCT_ID: !Ref GumroadProductId
          GUMROAD_WEBHOOK_SECRET: !Ref GumroadWebhookSecret
      Policies:
        - Version: '2012-10-17'
          Statement:
            # SES: send license emails
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource:
                - !Sub 'arn:aws:ses:us-east-1:${AWS::AccountId}:identity/contextpulse.ai'
            # DynamoDB: store and update license records
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:GetItem
              Resource:
                - !GetAtt LicensesTable.Arn
      Events:
        WebhookPost:
          Type: Api
          Properties:
            Path: /webhook
            Method: POST
            RestApiId: !Ref WebhookApi

  # -- API Gateway ------------------------------------------------------------
  WebhookApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref StageName
      Description: ContextPulse License Webhook API
      EndpointConfiguration:
        Type: REGIONAL
      # Throttle to prevent abuse
      MethodSettings:
        - HttpMethod: '*'
          ResourcePath: '/*'
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5

  # -- CloudWatch Alarm for Lambda errors ------------------------------------
  LicenseWebhookErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: contextpulse-license-webhook-errors
      AlarmDescription: Alerts when the license webhook Lambda has errors (failed deliveries, crashes)
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref LicenseWebhookFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  WebhookUrl:
    Description: Gumroad webhook URL (configure in Gumroad product settings)
    Value: !Sub 'https://${WebhookApi}.execute-api.us-east-1.amazonaws.com/${StageName}/webhook'
  LicenseWebhookFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LicenseWebhookFunction.Arn
  LicensesTableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt LicensesTable.Arn
